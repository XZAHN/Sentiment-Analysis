<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Predictor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Sentiment Analysis</h1>
        </div>
        <div class="chat-container" id="chatContainer">
            <div class="message bot-message">
                <div class="message-content">
                    <p>Hello! I'm here to analyze the sentiment of your text. Type a message and I'll tell you if it's positive or negative.</p>
                </div>
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="Enter your text here..." maxlength="500">
            <button id="sendButton">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
